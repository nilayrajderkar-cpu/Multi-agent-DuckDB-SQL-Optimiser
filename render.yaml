services:
  - type: web
    name: multi-agent-sql-optimizer
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: python -m uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: GROQ_API_KEY
        value: ${GROQ_API_KEY}
      - key: PORT
        value: 8000
    autoDeploy: true
